name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Find Gradle Wrapper
        id: gradle
        run: |
          GRADLEW=$(find . -type f -name gradlew | head -1)
          echo "gradlew_path=$GRADLEW" >> $GITHUB_OUTPUT

      - name: Check Project
        run: |
          if [ -z "${{ steps.gradle.outputs.gradlew_path }}" ]; then
            echo "gradlew not found."
            echo "This repository is not a complete Android Studio project."
            exit 1
          fi

      - name: Make Gradlew Executable
        run: chmod +x "${{ steps.gradle.outputs.gradlew_path }}"

      - name: Build Debug APK
        run: |
          cd "$(dirname '${{ steps.gradle.outputs.gradlew_path }}')"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: "**/*.apk"

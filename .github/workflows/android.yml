name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Create Mock .env file
      run: |
        echo "GEMINI_API_KEY=mock_key_for_ci" > .env

    - name: Fix Line Endings and Grant Execute Permissions
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Accept Android SDK Licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Set up Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          python3 -c "import base64; data = open('debug.keystore.base64', 'rb').read().replace(b'\r', b'').replace(b'\n', b'').replace(b' ', b''); open('debug.keystore', 'wb').write(base64.b64decode(data))"
        else
          echo "debug.keystore.base64 not found, generating a new debug keystore..."
          keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tuition-manager-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

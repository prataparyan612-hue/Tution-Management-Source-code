name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Mock .env file
      run: |
        echo "GEMINI_API_KEY=mock_key_for_ci" > .env

    - name: Fix Line Endings and Grant Execute Permissions
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Decode Debug Keystore
      run: |
        python3 -c "import base64; data = open('debug.keystore.base64', 'rb').read().replace(b'\r', b'').replace(b'\n', b'').replace(b' ', b''); open('debug.keystore', 'wb').write(base64.b64decode(data))"

    - name: Build Debug APK
      run: bash gradlew assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tuition-manager-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
